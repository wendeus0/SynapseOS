# Project-local Codex profile used by the isolated development container.

[profiles.container_aggressive]
model = "gpt-5"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[sandbox_workspace_write]
network_access = true

# ---------------------------------------------------------------------------
# MCP servers — baseline segura para o fluxo operacional do projeto
#
# O launcher `./scripts/dev-codex.sh` usa este arquivo como base e:
#   - habilita o MCP oficial do GitHub quando houver token no ambiente;
#   - reutiliza esse MCP para GitHub Actions via `--toolsets=default,actions`;
#   - deixa o MCP de SQLite desabilitado por padrão até existir um banco real.
#
# Pré-requisito para habilitar GitHub MCP:
#   export GITHUB_PERSONAL_ACCESS_TOKEN=ghp_...
# Compatibilidade:
#   se apenas `GITHUB_TOKEN` estiver definido, o launcher o reaproveita como
#   fallback para `GITHUB_PERSONAL_ACCESS_TOKEN`.
# ---------------------------------------------------------------------------

[mcp_servers.docker]
command = "uvx"
args = ["docker-mcp"]
