name: container-build

on:
  pull_request:
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "compose.yaml"
      - "docker-compose.yml"
      - "scripts/**"
      - ".python-version"
      - ".github/workflows/container-build.yml"
  push:
    branches-ignore:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "compose.yaml"
      - "docker-compose.yml"
      - "scripts/**"
      - ".python-version"
      - ".github/workflows/container-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: aignt-os:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate compose configuration
        run: docker compose -f compose.yaml config
