name: operational-ci

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch alignment
        run: ./scripts/validate-branch.sh --fetch --allow-main --base-ref origin/main

  repo-checks:
    runs-on: ubuntu-latest
    needs: branch-validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync project dependencies
        run: uv sync --locked --extra dev

      - name: Run repository operational checks
        run: ./scripts/commit-check.sh --skip-branch-validation --skip-docker --allow-main
